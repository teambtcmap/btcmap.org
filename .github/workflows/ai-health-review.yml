name: AI Codebase Health Review

on:
  schedule:
    - cron: '0 9 1,15 * *'
  workflow_dispatch:
    inputs:
      since_commit:
        description: 'Review commits starting from this commit hash (exclusive)'
        required: false

concurrency:
  group: health-review
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect commits
        id: commits
        run: |
          set -euo pipefail

          SINCE_COMMIT="${{ inputs.since_commit }}"
          if [[ -n "$SINCE_COMMIT" ]]; then
            # Use the provided commit's date as anchor
            SINCE_DATE=$(git log -1 --format='%aI' "$SINCE_COMMIT")
          else
            # Anchor to cutoff timestamp embedded in previous report, fall back to createdAt, then 14 days
            PREV_BODY=$(gh issue list --label "health-report" --state all --limit 1 \
              --json body --jq '.[0].body // empty' 2>/dev/null || true)
            LAST_CUTOFF=$(echo "$PREV_BODY" | grep -oP '<!-- cutoff: \K[^ ]+(?= -->)' || true)

            if [[ -n "$LAST_CUTOFF" ]]; then
              SINCE_DATE="$LAST_CUTOFF"
            else
              LAST_DATE=$(gh issue list --label "health-report" --state all --limit 1 \
                --json createdAt --jq '.[0].createdAt // empty' 2>/dev/null || true)
              if [[ -n "$LAST_DATE" ]]; then
                SINCE_DATE="$LAST_DATE"
              else
                SINCE_DATE=$(date -u -d '14 days ago' '+%Y-%m-%dT%H:%M:%SZ')
              fi
            fi
          fi

          echo "since_date=$SINCE_DATE" >> "$GITHUB_OUTPUT"

          # Record HEAD's commit date as cutoff for the next run
          CUTOFF=$(git log -1 --format='%aI' HEAD)
          echo "cutoff_date=$CUTOFF" >> "$GITHUB_OUTPUT"

          COMMIT_COUNT=$(git rev-list --count --since="$SINCE_DATE" --no-merges HEAD)
          COMMIT_LOG=$(set +o pipefail; git log --since="$SINCE_DATE" --no-merges --format='%h %s (%an)' | head -200)

          if [[ "$COMMIT_COUNT" -eq 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits since $SINCE_DATE"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          echo "$COMMIT_LOG" > /tmp/commit-log.txt

          OLDEST_HASH=$(set +o pipefail; git log --since="$SINCE_DATE" --no-merges --format='%H' --reverse | head -1)
          echo "oldest_hash=$OLDEST_HASH" >> "$GITHUB_OUTPUT"

          # Hotspot files
          git log --since="$SINCE_DATE" --no-merges --name-only --pretty=format: \
            | { grep -v '^$' || true; } | sort | uniq -c | sort -rn | head -15 > /tmp/hotspots.txt || true

      - name: Generate diff
        if: steps.commits.outputs.skip != 'true'
        run: |
          set -euo pipefail
          OLDEST_HASH="${{ steps.commits.outputs.oldest_hash }}"

          if git rev-parse "${OLDEST_HASH}^" >/dev/null 2>&1; then
            DIFF_BASE="${OLDEST_HASH}^"
          else
            DIFF_BASE=$(git hash-object -t tree /dev/null)
          fi

          git diff "$DIFF_BASE"..HEAD -- . \
            ':!pnpm-lock.yaml' ':!package-lock.json' ':!src/lib/i18n/locales/' \
            ':!*.snap' ':!*.lock' ':!static/images/' ':!static/icons/' \
            > /tmp/raw-diff.txt

          DIFF_SIZE=$(wc -c < /tmp/raw-diff.txt)
          echo "Diff size: ${DIFF_SIZE} bytes"

          MAX_SIZE=150000
          if [[ "$DIFF_SIZE" -gt "$MAX_SIZE" ]]; then
            echo "Truncating diff from ${DIFF_SIZE} to ${MAX_SIZE} bytes"
            head -c "$MAX_SIZE" /tmp/raw-diff.txt > /tmp/diff.txt
            printf '\n\n... [TRUNCATED: diff was %s bytes, showing first %s]\n' "$DIFF_SIZE" "$MAX_SIZE" >> /tmp/diff.txt
          else
            cp /tmp/raw-diff.txt /tmp/diff.txt
          fi

      - name: Collect full file contents
        if: steps.commits.outputs.skip != 'true'
        run: |
          set -euo pipefail
          MAX_CONTEXT=120000
          MAX_FILE=20000

          # Files changed in the diff (extract b/ path so renames resolve to the new name)
          grep '^diff --git' /tmp/raw-diff.txt \
            | sed 's|.* b/||' \
            | sort -u > /tmp/diff-files.txt

          # $lib/ and $components/ imports referenced in the diff but not themselves changed
          grep -ohP 'from ["\x27]\$(lib|components)/[^"\x27]+["\x27]' /tmp/raw-diff.txt \
            | sed 's/from ["'"'"']\$lib\//src\/lib\//; s/from ["'"'"']\$components\//src\/components\//; s/["'"'"']$//' \
            | sort -u > /tmp/imports-raw.txt || true

          > /tmp/imports-resolved.txt
          while IFS= read -r mod; do
            for candidate in "${mod}.ts" "${mod%.js}.ts" "${mod}/index.ts" "${mod}"; do
              if [[ -f "$candidate" ]]; then
                echo "$candidate" >> /tmp/imports-resolved.txt
                break
              fi
            done
          done < /tmp/imports-raw.txt

          # Merge, deduplicate, filter to source files
          cat /tmp/diff-files.txt /tmp/imports-resolved.txt \
            | sort -u \
            | grep -E '\.(ts|svelte|js)$' \
            | grep -vE 'node_modules|src/lib/i18n/locales/' > /tmp/context-files-unsorted.txt || true

          # Prioritize: server .ts first, then other .ts, then .svelte
          > /tmp/context-files.txt
          grep -E '\+server\.ts|\+page\.server\.ts' /tmp/context-files-unsorted.txt >> /tmp/context-files.txt || true
          grep -v -E '\+server\.ts|\+page\.server\.ts' /tmp/context-files-unsorted.txt \
            | grep '\.ts$' >> /tmp/context-files.txt || true
          grep '\.svelte$' /tmp/context-files-unsorted.txt >> /tmp/context-files.txt || true

          TOTAL=0
          > /tmp/file-contents.txt
          while IFS= read -r filepath; do
            if [[ -f "$filepath" ]]; then
              SIZE=$(wc -c < "$filepath")
              if (( SIZE > MAX_FILE )); then
                echo "[SKIPPED: $filepath ($SIZE bytes, over per-file limit)]" >> /tmp/file-contents.txt
                continue
              fi
              if (( TOTAL + SIZE > MAX_CONTEXT )); then
                echo "[SKIPPED: $filepath ($SIZE bytes, context budget exhausted)]" >> /tmp/file-contents.txt
                continue
              fi
              printf '=== %s ===\n' "$filepath" >> /tmp/file-contents.txt
              cat "$filepath" >> /tmp/file-contents.txt
              printf '\n\n' >> /tmp/file-contents.txt
              TOTAL=$((TOTAL + SIZE))
            fi
          done < /tmp/context-files.txt

          echo "Full context: ${TOTAL} bytes across $(wc -l < /tmp/context-files.txt) files"

      - name: AI review
        if: steps.commits.outputs.skip != 'true'
        env:
          PPQ_API_KEY: ${{ secrets.PPQ_API_KEY }}
        run: |
          set -euo pipefail

          COMMIT_LOG=$(cat /tmp/commit-log.txt)
          DIFF=$(cat /tmp/diff.txt)
          HOTSPOTS=$(cat /tmp/hotspots.txt)
          FILE_CONTENTS=$(cat /tmp/file-contents.txt 2>/dev/null || echo "")
          PROJECT_CONTEXT=$(cat CLAUDE.md 2>/dev/null || echo "")
          AGENTS_MD=$(cat AGENTS.md 2>/dev/null || echo "")
          README_MD=$(cat README.md 2>/dev/null || echo "")

          SYSTEM_PROMPT='You are a senior software engineer performing a biweekly code review for a SvelteKit web application (btcmap.org). Your job is to review recently merged code and provide actionable feedback.

          Your review focuses on four questions:
          1. "Did we miss something?" — bugs, security issues, logic errors, race conditions, missing error handling, accessibility problems, or quality issues in the merged code.
          2. "Can we refactor?" — patterns, duplication, or related changes across multiple commits that could be consolidated or improved now that they have all landed.
          3. "Is AGENTS.md outdated?" — compare the AGENTS.md documentation against the actual codebase patterns visible in the diff. Flag any conventions, tooling references, file paths, or project structure notes in AGENTS.md that contradict what the code actually does.
          4. "Is README.md outdated?" — compare the README.md against the actual codebase (commands, setup steps, project structure, dependencies). Flag any instructions, commands, or descriptions that no longer match reality.

          Project stack: Svelte 4 / SvelteKit 2 (NOT Svelte v5 — do not suggest runes/$state/$derived/$effect), Tailwind CSS v4, TypeScript, Biome (linter/formatter), Vitest, Playwright, Leaflet maps, axios, localforage.

          Review guidelines:
          - Focus on the DIFF, not hypotheticals. Every finding must reference specific code from the diff.
          - Prioritize: security > bugs > error handling > performance > code quality > style.
          - Be specific: include file paths and describe the issue clearly.
          - Be concise: no filler, no praise, no "the code looks good overall" padding.
          - Group related findings.
          - If the changes are mostly dependency bumps or locale file updates, say so briefly and focus on substantive code changes.
          - Rate each finding: CRITICAL, HIGH, MEDIUM, or LOW.
          - Aim for 0-5 findings. Empty or short reports are good outcomes — only add more findings if the period genuinely warrants them, never to "look thorough".
          - Do NOT suggest migrating to Svelte v5 runes — the project intentionally stays on v4.
          - Do NOT suggest formatting or import ordering changes — Biome handles that.
          - If nothing significant was missed and there are no refactoring opportunities, say so briefly. Do not invent findings.

          Verification rules (mandatory):
          - ONLY report issues you can directly verify from the provided diff AND full file contents. If you need a file that is not provided, do NOT report the finding.
          - For each finding, you must be able to point to specific lines in the diff or file contents that prove the issue exists. If you cannot, drop it.
          - NEVER assume what a module contains based on its name. Read the provided file contents. If a module is not included, do not make claims about its internals.
          - Before flagging a pattern in new code, check whether existing files in the full file contents use the same pattern. If they do, it is an established project convention — do not flag it.
          - Do NOT include unverified or speculative findings. If you cannot directly point to specific lines in the provided diff or file contents that prove the issue exists, drop the finding entirely. There is no quota for "[UNVERIFIED]" or low-confidence items — omit them.

          Output format (strict markdown):
          # Biweekly Codebase Health Review

          ## Summary
          [2-3 sentences: what changed, overall assessment]

          ## Findings

          ### [SEVERITY]: [Short title]
          **Files:** `path/to/file`
          [Description of the issue and what to do about it. Include a brief code snippet from the diff if helpful.]

          ---

          (repeat for each finding, separated by ---)

          ## Refactoring Opportunities
          [Cross-cutting patterns or consolidation opportunities. Otherwise "None identified in this period."]

          ## AGENTS.md Drift
          [Any conventions, tooling references, or project structure notes in AGENTS.md that are outdated or contradict what the code actually does. Otherwise "AGENTS.md is up to date."]

          ## README.md Drift
          [Any setup instructions, commands, descriptions, or references in README.md that are outdated or incorrect. Otherwise "README.md is up to date."]

          ## Stats
          - **Commits reviewed:** N
          - **Period:** DATE to DATE'

          USER_PROMPT="Here are the project conventions (CLAUDE.md):

          <project-conventions>
          ${PROJECT_CONTEXT}
          </project-conventions>

          Here is AGENTS.md (check if it is outdated relative to the codebase):

          <agents-md>
          ${AGENTS_MD}
          </agents-md>

          Here is README.md (check if it is outdated relative to the codebase):

          <readme-md>
          ${README_MD}
          </readme-md>

          Commit log (${{ steps.commits.outputs.commit_count }} commits since ${{ steps.commits.outputs.since_date }}):

          <commit-log>
          ${COMMIT_LOG}
          </commit-log>

          Most frequently changed files:

          <hotspots>
          ${HOTSPOTS}
          </hotspots>

          Full file contents for diff-touched source files and their key imports.
          Use these to VERIFY findings — they show the complete current state, not just changed lines:

          <file-contents>
          ${FILE_CONTENTS}
          </file-contents>

          Unified diff (noise files excluded):

          <diff>
          ${DIFF}
          </diff>

          IMPORTANT — These paths are EXCLUDED from the diff and you have NO visibility into their contents:
          - src/lib/i18n/locales/* (all translation JSON files)
          - pnpm-lock.yaml, package-lock.json, *.lock
          - *.snap (test snapshots)
          - static/images/*, static/icons/*
          Do NOT claim translation keys are missing — you cannot see the locale files.
          Do NOT flag lock file or snapshot changes.

          Please review and produce your health review report."

          # Write prompts to files to avoid "Argument list too long" with jq --arg
          printf '%s' "$SYSTEM_PROMPT" > /tmp/system-prompt.txt
          printf '%s' "$USER_PROMPT" > /tmp/user-prompt.txt

          jq -n \
            --arg model "anthropic/claude-opus-4.6" \
            --rawfile system /tmp/system-prompt.txt \
            --rawfile user /tmp/user-prompt.txt \
            '{
              model: $model,
              messages: [
                { role: "system", content: $system },
                { role: "user", content: $user }
              ],
              max_tokens: 4096
            }' > /tmp/api-request.json

          HTTP_STATUS=$(curl -s -w '%{http_code}' -o /tmp/api-response.json \
            -X POST \
            -H "Authorization: Bearer ${PPQ_API_KEY}" \
            -H "Content-Type: application/json" \
            https://api.ppq.ai/chat/completions \
            -d @/tmp/api-request.json) || HTTP_STATUS="000"

          if [[ "$HTTP_STATUS" != "200" ]]; then
            ERROR_MSG=$(jq -r '.error.message // .message // "Unknown error"' /tmp/api-response.json 2>/dev/null || echo "Unknown error")
            echo "::error::PPQ API returned HTTP $HTTP_STATUS: $ERROR_MSG"
            exit 1
          fi

          # Extract AI response
          jq -r '.choices[0].message.content' /tmp/api-response.json > /tmp/review.md

          # Append footer with cutoff timestamp for next run's anchor
          CUTOFF="${{ steps.commits.outputs.cutoff_date }}"
          cat >> /tmp/review.md << FOOTER

          ---
          _Generated by [AI Health Review](../../actions/workflows/ai-health-review.yml) using GitHub Models._
          _Reply with \`/run-now\` to trigger a new review or \`/create-issue <title>\` to create a follow-up issue._
          <!-- cutoff: ${CUTOFF} -->
          FOOTER

          echo "Review generated ($(wc -c < /tmp/review.md) bytes)"

      - name: Drop findings whose files do not exist
        if: steps.commits.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          # Drop findings (### blocks under ## Findings) whose **Files:** path
          # does not exist in the working tree. Catches the most common AI
          # hallucination: inventing a file from an import or naming guess.
          import os
          import re
          import sys

          path = "/tmp/review.md"
          with open(path, "r", encoding="utf-8") as f:
              text = f.read()

          # Split off the Findings section so we only process findings; leave
          # everything before and after untouched.
          findings_re = re.compile(
              r"(## Findings\s*\n)(.*?)(\n##\s+\S)", re.DOTALL
          )
          m = findings_re.search(text)
          if not m:
              print("No '## Findings' section found — leaving review unchanged.")
              sys.exit(0)

          head, body, tail = m.group(1), m.group(2), m.group(3)

          # Findings are ### blocks separated by '---' on its own line.
          # Split conservatively on '\n---\n' (or '\n---\s*\n').
          blocks = re.split(r"\n---\s*\n", body.strip())

          file_re = re.compile(r"\*\*Files?:\*\*\s*(.+)")
          path_re = re.compile(r"`([^`]+)`")

          kept = []
          dropped = []
          for block in blocks:
              if not block.strip().startswith("###"):
                  # Preamble or unstructured content — keep as-is.
                  kept.append(block)
                  continue
              fm = file_re.search(block)
              if not fm:
                  # No **Files:** line — can't verify, keep (rare).
                  kept.append(block)
                  continue
              raw = fm.group(1).strip()
              # Pull each `path` from the line; fall back to whitespace/comma
              # split if no backticks were used.
              paths = path_re.findall(raw)
              if not paths:
                  paths = [p.strip().rstrip(",") for p in re.split(r"[,\s]+", raw) if p.strip()]
              missing = [p for p in paths if not os.path.isfile(p)]
              if missing:
                  title = block.splitlines()[0].strip()
                  dropped.append((title, missing))
                  continue
              kept.append(block)

          new_body = "\n\n---\n\n".join(kept).strip() + "\n\n"

          # If everything was dropped, leave a placeholder so the section is
          # still present and downstream consumers don't break.
          if not any(b.strip().startswith("###") for b in kept):
              new_body += "_All findings were dropped by post-processing (file paths did not exist in the repo)._\n\n"

          new_text = text[:m.start()] + head + new_body + tail + text[m.end():]
          with open(path, "w", encoding="utf-8") as f:
              f.write(new_text)

          if dropped:
              print(f"Dropped {len(dropped)} finding(s) whose file paths do not exist:")
              for title, missing in dropped:
                  print(f"  - {title}")
                  for p in missing:
                      print(f"      missing: {p}")
          else:
              print("No findings dropped — all referenced file paths exist.")
          PY

      - name: Create issue
        if: steps.commits.outputs.skip != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            let reviewBody;
            try {
              reviewBody = fs.readFileSync('/tmp/review.md', 'utf8');
            } catch (e) {
              reviewBody = '# Biweekly Codebase Health Review\n\nError: Could not read review file.';
            }

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'health-report'
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'health-report',
                color: '0075ca',
                description: 'AI-powered biweekly codebase health review'
              });
            }

            const today = new Date().toISOString().split('T')[0];
            let issue;
            try {
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Biweekly Codebase Health Review — ${today}`,
                body: reviewBody,
                labels: ['health-report']
              });
            } catch (e) {
              core.setFailed(`Failed to create health review issue: ${e.message}`);
              return;
            }

            core.info(`Created review issue #${issue.data.number}`);

            // Close previous open health-report issues
            try {
              const openIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'health-report',
                state: 'open',
                per_page: 30
              });

              for (const prev of openIssues.data) {
                if (prev.number !== issue.data.number) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prev.number,
                    state: 'closed',
                    state_reason: 'completed'
                  });
                  core.info(`Closed previous report issue #${prev.number}`);
                }
              }
            } catch (e) {
              core.warning(`Failed to close previous issues: ${e.message}`);
            }
